services:
  tutor-app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    volumes:
      - ./models:/app/models 

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
  
  # --- ADD THIS NEW AUTOMATION BLOCK ---
  ollama-pull:
    image: curlimages/curl:latest
    restart: "no"
    command: >
      sh -c "
      echo 'Waiting for Ollama to wake up...';
      sleep 10;
      echo 'Pulling Llama 3.2:1b model... This may take a few minutes...';
      curl -s -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.2:1b\"}';
      echo 'LLM Ready!';
      "
    depends_on:
      - ollama

  ngrok:
    image: ngrok/ngrok:latest
    restart: always
    environment:
      # This securely pulls the token from your new .env file!
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "tutor-app:8000"
      - "--host-header=tutor-app:8000"
    depends_on:
      - tutor-app

volumes:
  ollama_models: