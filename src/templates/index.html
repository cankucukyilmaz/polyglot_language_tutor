<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyglot Tutor</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        h1 { color: #333; }
        .controls { margin-top: 20px; padding: 30px; border: 1px solid #ddd; display: inline-block; border-radius: 10px; background: white; box-shadow: 0px 4px 6px rgba(0,0,0,0.1); width: 80%; max-width: 600px; }
        select, button { padding: 12px 20px; font-size: 16px; margin: 10px; border-radius: 5px; }
        button { cursor: pointer; background-color: #007bff; color: white; border: none; transition: 0.3s; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #statusText { font-weight: bold; color: #555; margin-bottom: 20px;}
        .setting-group { margin-bottom: 15px; }
        
        /* THE NEW TRANSCRIPT BOX CSS */
        #transcriptBox {
            height: 250px;
            overflow-y: auto;
            text-align: left;
            padding: 15px;
            border: 1px solid #ccc;
            background: #fafafa;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 16px;
            line-height: 1.5;
        }
        .user-msg { color: #0056b3; margin-bottom: 8px; }
        .ai-msg { color: #28a745; margin-bottom: 8px; }
    </style>
</head>
<body>
    <h1>Polyglot AI Tutor</h1>
    
    <div class="controls">
        <div class="setting-group">
            <label for="languageSelect"><strong>Choose your language:</strong></label><br>
            <select id="languageSelect">
                <option value="1">English</option>
                <option value="2">Deutsch</option>
                <option value="3">Español</option>
            </select>
        </div>

        <div class="setting-group">
            <label for="speedSelect"><strong>Speech Speed:</strong></label><br>
            <select id="speedSelect">
                <option value="0.5">0.5x (Very Slow)</option>
                <option value="0.75">0.75x (Slow)</option>
                <option value="1.0" selected>1.0x (Normal)</option>
                <option value="1.25">1.25x (Fast)</option>
                <option value="1.5">1.5x (Very Fast)</option>
            </select>
        </div>
        
        <button id="toggleChat">Start Conversation</button>
        <p id="statusText">Ready to practice.</p>

        <div id="transcriptBox">
            <div style="color: #999; text-align: center; margin-top: 100px;">
                <em>Conversation will appear here...</em>
            </div>
        </div>
    </div>

    <script>
        let ws;
        let audioPlayer = new Audio(); 
        let isRecording = false;
        
        let audioContext;
        let processor;
        let mediaStream;

        const toggleBtn = document.getElementById("toggleChat");
        const statusText = document.getElementById("statusText");
        const languageSelect = document.getElementById("languageSelect");
        const speedSelect = document.getElementById("speedSelect");
        const transcriptBox = document.getElementById("transcriptBox"); // NEW

        toggleBtn.onclick = async () => {
            if (isRecording) {
                stopConversation(false); 
            } else {
                startConversation();
            }
        };

        async function startConversation() {
            isRecording = true;
            toggleBtn.innerText = "Stop Conversation";
            toggleBtn.style.backgroundColor = "#dc3545"; 
            statusText.innerText = "Requesting microphone...";
            statusText.style.color = "black";
            transcriptBox.innerHTML = ""; // Clear the box on new chat

            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (err) {
                console.error("Mic error:", err);
                statusText.innerText = "Microphone blocked! Please refresh and allow access.";
                statusText.style.color = "red";
                stopConversation(true); 
                return; 
            }

            statusText.innerText = "Connecting to AI...";
            const langId = languageSelect.value;
            const speed = speedSelect.value;
            
            const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            const host = window.location.host;
            
            ws = new WebSocket(`${protocol}//${host}/ws/${langId}?speed=${speed}`);

            ws.onopen = async () => {
                statusText.innerText = "Listening... Start speaking!";
                statusText.style.color = "green";
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                const source = audioContext.createMediaStreamSource(mediaStream);
                processor = audioContext.createScriptProcessor(4096, 1, 1);
                
                processor.onaudioprocess = (e) => {
                    if (ws.readyState === WebSocket.OPEN) {
                        const inputData = e.inputBuffer.getChannelData(0);
                        const pcm16 = new Int16Array(inputData.length);
                        for (let i = 0; i < inputData.length; i++) {
                            let s = Math.max(-1, Math.min(1, inputData[i]));
                            pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                        }
                        ws.send(pcm16.buffer); 
                    }
                };

                source.connect(processor);
                processor.connect(audioContext.destination);
            };

            ws.onmessage = async (event) => {
                if (typeof event.data === "string") {
                    const msg = JSON.parse(event.data);
                    
                    if (msg.action === "stop_audio") {
                        console.log("Interrupted! Muting the AI.");
                        audioPlayer.pause();
                        audioPlayer.currentTime = 0; 
                    } 
                    // --- NEW: HANDLE INCOMING TEXT FOR TRANSCRIPT ---
                    else if (msg.role) {
                        const name = msg.role === "user" ? "You" : "Tutor";
                        const cssClass = msg.role === "user" ? "user-msg" : "ai-msg";
                        transcriptBox.innerHTML += `<div class="${cssClass}"><strong>${name}:</strong> ${msg.text}</div>`;
                        transcriptBox.scrollTop = transcriptBox.scrollHeight; // Auto-scroll to bottom
                    }
                } else {
                    const audioBlob = new Blob([event.data], { type: 'audio/wav' });
                    audioPlayer.src = URL.createObjectURL(audioBlob);
                    audioPlayer.play();
                }
            };

            ws.onclose = () => {
                if (isRecording) {
                    statusText.innerText = "Connection lost. AI disconnected.";
                    statusText.style.color = "red";
                    stopConversation(true);
                }
            };

            ws.onerror = (err) => {
                console.error("WS Error:", err);
                statusText.innerText = "Network error. Make sure your server is running.";
                statusText.style.color = "red";
                stopConversation(true);
            }
        }

        function stopConversation(isError = false) {
            isRecording = false;
            toggleBtn.innerText = "Start Conversation";
            toggleBtn.style.backgroundColor = "#007bff"; 
            
            if (!isError) {
                statusText.innerText = "Session ended.";
                statusText.style.color = "gray";
            }
            
            if (ws) ws.close();
            audioPlayer.pause();
            
            if (processor) processor.disconnect();
            if (audioContext) audioContext.close();
            if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
        }
    </script>
</body>
</html>
